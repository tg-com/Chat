<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Reply Feature</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0b1118;
    --chat-bg: #111b21;
    --sent: #005c4b;
    --recv: #1f2c34;
    --accent: #00a884;
    --text: #e9edef;
    --sub: #8696a0;
    --reply-sent: #004438;
    --reply-recv: #182229;
    --bar: #202c33;
    --input-bg: #2a3942;
    --border: #2a3942;
    --font: 'Nunito', sans-serif;
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--bar);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #2a394250;
    flex-shrink: 0;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00a884, #00796b);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: #fff;
    flex-shrink: 0;
  }
  .header-info h3 { font-size: 15px; color: var(--text); font-weight: 700; }
  .header-info span { font-size: 12px; color: var(--accent); }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--chat-bg);
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 4px; }

  /* MESSAGE WRAPPER */
  .msg-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    position: relative;
    transition: transform 0.2s ease;
  }
  .msg-wrapper.sent { justify-content: flex-end; }
  .msg-wrapper.recv { justify-content: flex-start; }

  /* SWIPE REPLY INDICATOR */
  .reply-icon {
    position: absolute;
    right: -40px;
    bottom: 4px;
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    font-size: 14px;
    color: #fff;
    pointer-events: none;
    box-shadow: 0 2px 8px #00a88460;
  }
  .msg-wrapper.sent .reply-icon { right: auto; left: -40px; }

  /* BUBBLE */
  .bubble {
    max-width: 75%;
    padding: 6px 10px 8px;
    border-radius: 10px;
    position: relative;
    word-break: break-word;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s;
  }
  .bubble:active { transform: scale(0.97); }
  .sent .bubble {
    background: var(--sent);
    border-bottom-right-radius: 3px;
  }
  .recv .bubble {
    background: var(--recv);
    border-bottom-left-radius: 3px;
  }

  /* QUOTED/REPLY BLOCK inside bubble */
  .quote-block {
    border-left: 3px solid var(--accent);
    padding: 5px 8px;
    border-radius: 5px;
    margin-bottom: 5px;
    font-size: 12.5px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sent .quote-block { background: var(--reply-sent); }
  .recv .quote-block { background: var(--reply-recv); }
  .quote-block .quote-name { color: var(--accent); font-weight: 700; font-size: 12px; }
  .quote-block .quote-text { color: #aab8c2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

  .bubble-text { font-size: 14px; color: var(--text); line-height: 1.4; }
  .bubble-meta {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 3px; margin-top: 2px;
  }
  .bubble-time { font-size: 11px; color: var(--sub); }
  .tick { font-size: 13px; color: var(--accent); }

  /* DATE DIVIDER */
  .date-divider {
    text-align: center;
    margin: 8px 0;
  }
  .date-divider span {
    background: #1f2c34;
    color: var(--sub);
    font-size: 11.5px;
    padding: 4px 12px;
    border-radius: 8px;
  }

  /* REPLY PREVIEW BAR */
  .reply-bar {
    background: var(--bar);
    border-top: 2px solid var(--accent);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideUp 0.2s ease;
    flex-shrink: 0;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .reply-bar-content {
    flex: 1;
    border-left: 3px solid var(--accent);
    padding-left: 10px;
  }
  .reply-bar-name { font-size: 12.5px; font-weight: 700; color: var(--accent); }
  .reply-bar-text { font-size: 12.5px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
  .reply-bar-close {
    background: none; border: none;
    color: var(--sub); font-size: 20px;
    cursor: pointer; padding: 4px;
    line-height: 1;
    transition: color 0.2s;
  }
  .reply-bar-close:hover { color: var(--text); }

  /* INPUT AREA */
  .input-area {
    background: var(--bar);
    padding: 8px 10px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: var(--input-bg);
    border-radius: 22px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .emoji-btn {
    background: none; border: none;
    font-size: 22px; cursor: pointer;
    flex-shrink: 0; line-height: 1;
  }
  #msgInput {
    flex: 1;
    background: none; border: none;
    outline: none;
    font-family: var(--font);
    font-size: 14.5px;
    color: var(--text);
    resize: none;
    max-height: 100px;
    line-height: 1.4;
  }
  #msgInput::placeholder { color: var(--sub); }
  .send-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 20px;
    color: #fff;
    transition: transform 0.15s, background 0.15s;
    box-shadow: 0 2px 8px #00a88440;
  }
  .send-btn:hover { transform: scale(1.08); background: #00c89a; }
  .send-btn:active { transform: scale(0.94); }

  /* CONTEXT MENU */
  .ctx-menu {
    position: fixed;
    background: #233038;
    border-radius: 10px;
    box-shadow: 0 4px 20px #00000080;
    padding: 4px 0;
    z-index: 999;
    min-width: 140px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  .ctx-menu button {
    width: 100%;
    background: none; border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 16px;
    text-align: left;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s;
  }
  .ctx-menu button:hover { background: #2a3942; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a3942;
    color: var(--text);
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 1000;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="avatar">A</div>
  <div class="header-info">
    <h3>Amar Bhaiya</h3>
    <span>online</span>
  </div>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages"></div>

<!-- REPLY PREVIEW BAR (hidden by default) -->
<div class="reply-bar" id="replyBar" style="display:none">
  <div class="reply-bar-content" id="replyBarContent">
    <div class="reply-bar-name" id="replyBarName"></div>
    <div class="reply-bar-text" id="replyBarText"></div>
  </div>
  <button class="reply-bar-close" onclick="cancelReply()">✕</button>
</div>

<!-- INPUT AREA -->
<div class="input-area">
  <div class="input-wrap">
    <button class="emoji-btn">😊</button>
    <textarea id="msgInput" placeholder="Message" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu" style="display:none">
  <button onclick="replyFromMenu()">↩️ Reply</button>
  <button onclick="copyFromMenu()">📋 Copy</button>
  <button onclick="deleteFromMenu()">🗑️ Delete</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────
const ME = "You";
const OTHER = "Amar Bhaiya";

let messages = [
  { id: 1, sender: OTHER, text: "Bhai, TaskMate ka dashboard update ho gaya?", time: "2:30 PM", replyTo: null },
  { id: 2, sender: ME, text: "Haan bhai, almost ho gaya. Thoda bacha hai.", time: "2:31 PM", replyTo: null },
  { id: 3, sender: OTHER, text: "Okay, aur payments wala section?", time: "2:31 PM", replyTo: null },
  { id: 4, sender: ME, text: "Razorpay integration bhi done hai ✅", time: "2:32 PM", replyTo: 3 },
  { id: 5, sender: OTHER, text: "Wah bhai! Tab kya update kare?", time: "2:33 PM", replyTo: null },
];
let nextId = 6;
let replyTarget = null;
let ctxTarget = null;

// ─── RENDER ─────────────────────────────────────────────────
function getMsg(id) { return messages.find(m => m.id === id); }

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';

  let lastDate = null;
  const today = "Today";
  const date = today; // simplified

  if (lastDate !== date) {
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.innerHTML = `<span>${date}</span>`;
    container.appendChild(div);
  }

  messages.forEach(msg => {
    const isSent = msg.sender === ME;
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${isSent ? 'sent' : 'recv'}`;
    wrapper.dataset.id = msg.id;

    // Reply icon (shown on swipe)
    const icon = document.createElement('div');
    icon.className = 'reply-icon';
    icon.textContent = '↩';
    wrapper.appendChild(icon);

    // Bubble
    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // Quote block
    if (msg.replyTo) {
      const orig = getMsg(msg.replyTo);
      if (orig) {
        const qb = document.createElement('div');
        qb.className = 'quote-block';
        qb.innerHTML = `
          <span class="quote-name">${orig.sender === ME ? 'You' : orig.sender}</span>
          <span class="quote-text">${orig.text}</span>
        `;
        bubble.appendChild(qb);
      }
    }

    const textEl = document.createElement('div');
    textEl.className = 'bubble-text';
    textEl.textContent = msg.text;
    bubble.appendChild(textEl);

    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    meta.innerHTML = `<span class="bubble-time">${msg.time}</span>${isSent ? '<span class="tick">✓✓</span>' : ''}`;
    bubble.appendChild(meta);

    wrapper.appendChild(bubble);
    container.appendChild(wrapper);

    // Events
    bubble.addEventListener('contextmenu', e => { e.preventDefault(); openCtxMenu(e, msg.id); });
    bubble.addEventListener('touchstart', handleTouchStart, { passive: true });
    bubble.addEventListener('touchmove', handleTouchMove, { passive: true });
    bubble.addEventListener('touchend', handleTouchEnd);
  });

  container.scrollTop = container.scrollHeight;
}

// ─── TOUCH SWIPE TO REPLY ────────────────────────────────────
let touchStartX = 0, touchWrapper = null, swipeTriggered = false;

function handleTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchWrapper = e.currentTarget.closest('.msg-wrapper');
  swipeTriggered = false;
}
function handleTouchMove(e) {
  if (!touchWrapper) return;
  const dx = e.touches[0].clientX - touchStartX;
  const isSent = touchWrapper.classList.contains('sent');
  const move = isSent ? Math.min(0, dx) : Math.max(0, dx); // sent: swipe left, recv: swipe right

  const threshold = 60;
  const clamped = isSent ? Math.max(-threshold, move) : Math.min(threshold, move);

  touchWrapper.style.transform = `translateX(${clamped}px)`;
  const icon = touchWrapper.querySelector('.reply-icon');
  const progress = Math.abs(clamped) / threshold;
  icon.style.opacity = progress;

  if (Math.abs(clamped) >= threshold - 5 && !swipeTriggered) {
    swipeTriggered = true;
    triggerHaptic();
  }
}
function handleTouchEnd() {
  if (!touchWrapper) return;
  if (swipeTriggered) {
    const id = parseInt(touchWrapper.dataset.id);
    setReply(id);
  }
  touchWrapper.style.transform = '';
  const icon = touchWrapper.querySelector('.reply-icon');
  if (icon) icon.style.opacity = 0;
  touchWrapper = null;
}
function triggerHaptic() {
  if (navigator.vibrate) navigator.vibrate(30);
}

// ─── CONTEXT MENU ────────────────────────────────────────────
function openCtxMenu(e, id) {
  ctxTarget = id;
  const menu = document.getElementById('ctxMenu');
  menu.style.display = 'block';
  let x = e.clientX, y = e.clientY;
  if (x + 160 > window.innerWidth) x = window.innerWidth - 160;
  if (y + 130 > window.innerHeight) y = window.innerHeight - 130;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}
document.addEventListener('click', () => {
  document.getElementById('ctxMenu').style.display = 'none';
});
function replyFromMenu() {
  if (ctxTarget) setReply(ctxTarget);
  document.getElementById('ctxMenu').style.display = 'none';
}
function copyFromMenu() {
  const msg = getMsg(ctxTarget);
  if (msg) {
    navigator.clipboard?.writeText(msg.text).catch(() => {});
    showToast('Message copied!');
  }
  document.getElementById('ctxMenu').style.display = 'none';
}
function deleteFromMenu() {
  messages = messages.filter(m => m.id !== ctxTarget);
  document.getElementById('ctxMenu').style.display = 'none';
  renderMessages();
  showToast('Message deleted');
}

// ─── REPLY LOGIC ─────────────────────────────────────────────
function setReply(id) {
  const msg = getMsg(id);
  if (!msg) return;
  replyTarget = id;
  const bar = document.getElementById('replyBar');
  bar.style.display = 'flex';
  document.getElementById('replyBarName').textContent = msg.sender === ME ? 'You' : msg.sender;
  document.getElementById('replyBarText').textContent = msg.text;
  document.getElementById('msgInput').focus();
}
function cancelReply() {
  replyTarget = null;
  document.getElementById('replyBar').style.display = 'none';
}

// ─── SEND MESSAGE ────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const now = new Date();
  const time = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

  messages.push({
    id: nextId++,
    sender: ME,
    text,
    time,
    replyTo: replyTarget
  });

  input.value = '';
  input.style.height = 'auto';
  cancelReply();
  renderMessages();

  // Simulate reply after 1.5s
  if (Math.random() > 0.4) {
    setTimeout(() => simulateReply(nextId - 1), 1500);
  }
}

function simulateReply(replyToId) {
  const replies = [
    "Haan bhai, theek hai!",
    "Okay got it 👍",
    "Acha! Aur kuch?",
    "Perfect bhai 🔥",
    "Bahut badhiya!",
    "Send kar do github pe"
  ];
  const now = new Date();
  const time = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  messages.push({
    id: nextId++,
    sender: OTHER,
    text: replies[Math.floor(Math.random() * replies.length)],
    time,
    replyTo: Math.random() > 0.5 ? replyToId : null
  });
  renderMessages();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ─── TOAST ───────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── INIT ────────────────────────────────────────────────────
renderMessages();
</script>
</body>
</html>
