<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat | Anonymous & Secure</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #e5ddd5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        /* Login Screen */
        #login-screen { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        #login-screen h2 { margin-bottom: 20px; color: #075e54; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        #join-btn { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Chat Screen */
        #chat-screen { width: 100%; height: 100%; display: flex; flex-direction: column; background: #efe7de; display: none; }
        #chat-screen.active { display: flex; }
        
        /* Header */
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #leave-btn { background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* Messages Area */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { margin-bottom: 15px; padding: 8px 12px; border-radius: 8px; max-width: 70%; position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .own { background: #dcf8c6; align-self: flex-end; }
        .other { background: white; align-self: flex-start; }
        .system { background: #fff5c4; align-self: center; font-size: 12px; color: #555; }
        .meta { font-size: 11px; color: #666; margin-bottom: 4px; }
        .ticks { font-size: 14px; margin-left: 5px; }

        /* Footer Input */
        footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; }
        #message-input { flex: 1; padding: 12px; border-radius: 20px; border: none; margin-right: 10px; }
        #send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

        #typing-indicator { padding: 5px 20px; font-size: 13px; color: #555; font-style: italic; background: #efe7de; height: 25px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Ghost Chat</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="Your Name" required>
            <input type="text" id="room-ip" placeholder="Room ID (Any name)" required>
            <button type="submit" id="join-btn">
                <span id="btn-text">JOIN ROOM</span>
                <span id="btn-loader" class="hidden">Connecting...</span>
            </button>
        </form>
        <div id="status" style="margin-top: 10px; font-size: 12px;"></div>
    </div>

    <div id="chat-screen">
        <header>
            <div>
                <strong id="display-room"></strong> <br>
                <small id="online-count">Online: 0</small>
            </div>
            <div>
                <span id="display-username" style="margin-right: 15px;"></span>
                <button id="leave-btn">Exit</button>
            </div>
        </header>

        <div id="messages"></div>
        <div id="typing-indicator"></div>

        <footer>
            <input type="text" id="message-input" placeholder="Type a message...">
            <button id="send-btn">➔</button>
        </footer>
    </div>

    <script>
        const socket = io();

        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const roomInput = document.getElementById('room-ip');
        const statusDiv = document.getElementById('status');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const displayRoom = document.getElementById('display-room');
        const displayUsername = document.getElementById('display-username');
        const leaveBtn = document.getElementById('leave-btn');
        const typingDiv = document.getElementById('typing-indicator');
        const onlineCountDiv = document.getElementById('online-count');

        let currentUser = '';
        let currentRoom = '';

        // 1. Login Logic
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const room = roomInput.value.trim();
            
            if (!username || !room) return;
            
            currentUser = username;
            currentRoom = room;
            
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            socket.emit('join-room', { username, room });
        });

        // 2. Joining Confirmation
        socket.on('joined-room', ({ room, username }) => {
            loginScreen.classList.add('hidden');
            chatScreen.classList.add('active');
            displayRoom.textContent = "Room: " + room;
            displayUsername.textContent = username;
            messagesDiv.innerHTML = '';
            addSystemMessage(`Welcome to ${room}`);
        });

        socket.on('update-user-count', (count) => {
            onlineCountDiv.textContent = `Online: ${count}`;
        });

        // 3. Typing Logic
        messageInput.addEventListener('input', () => {
            socket.emit('typing', { room: currentRoom, username: currentUser, isTyping: messageInput.value.length > 0 });
        });

        socket.on('display-typing', (data) => {
            if (data.username !== currentUser) {
                typingDiv.textContent = data.isTyping ? `${data.username} is typing...` : '';
            }
        });

        // 4. Message Handling
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            socket.emit('send-message', { room: currentRoom, message });
            messageInput.value = '';
            socket.emit('typing', { room: currentRoom, username: currentUser, isTyping: false });
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        socket.on('new-message', ({ username, message, timestamp }) => {
            const isOwn = username === currentUser;
            const msgElement = addMessage(username, message, isOwn, timestamp);
            
            if (!isOwn) socket.emit('mark-seen', { room: currentRoom, msgId: timestamp });

            // 60s Auto-Delete Feature
            setTimeout(() => {
                if (msgElement) {
                    msgElement.style.opacity = '0';
                    msgElement.style.transform = 'scale(0.8)';
                    setTimeout(() => msgElement.remove(), 500); 
                }
            }, 60000); 
        });

        socket.on('message-seen-update', (msgId) => {
            const ticks = document.querySelector(`[data-id="${msgId}"] .ticks`);
            if (ticks) {
                ticks.textContent = ' ✔✔';
                ticks.style.color = '#34B7F1';
            }
        });

        // 5. Cleanup
        function cleanupAndLeave() {
            if (currentRoom) socket.emit('leave-room', { room: currentRoom });
            window.location.reload(); 
        }

        leaveBtn.addEventListener('click', cleanupAndLeave);
        window.addEventListener('beforeunload', cleanupAndLeave);

        // Helpers
        function addMessage(username, message, isOwn, timestamp) {
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            div.setAttribute('data-id', timestamp);
            div.style.transition = 'all 0.5s ease';
            
            const time = new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const ticks = isOwn ? '<span class="ticks" style="color:gray;"> ✔</span>' : '';
            
            div.innerHTML = `
                <div class="meta">${username} • ${time} ${ticks}</div>
                <div class="text-content">${escapeHtml(message)}</div>
            `;
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system';
            div.textContent = text;
            messagesDiv.appendChild(div);
            setTimeout(() => div.remove(), 5000);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
urn div.innerHTML;
}
