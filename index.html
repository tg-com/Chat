<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG-COM Realtime Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 90%; max-width: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        #chat-box { height: 400px; overflow-y: auto; padding: 15px; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .received { background: #e4e6eb; align-self: flex-start; }
        .sent { background: #0084ff; color: white; align-self: flex-end; }
        .input-area { display: flex; padding: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 10px 15px; background: #0084ff; color: white; border: none; border-radius: 5px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script type="module">
    // Firebase CDN Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Aapka Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAC2NpHaaN8jTQg5G4GaISy76rnYSOGIqs",
        authDomain: "my-chat-77ef9.firebaseapp.com",
        databaseURL: "https://my-chat-77ef9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-chat-77ef9",
        storageBucket: "my-chat-77ef9.firebasestorage.app",
        messagingSenderId: "201184055478",
        appId: "1:201184055478:web:98e67e97e0b6c1f80ed617"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, "messages");

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // Message bhejne ka logic
    sendBtn.onclick = () => {
        const text = messageInput.value;
        if (text.trim() !== "") {
            push(messagesRef, {
                message: text,
                timestamp: Date.now()
            });
            messageInput.value = "";
        }
    };

    // Real-time message receive karne ka logic
    onChildAdded(messagesRef, (data) => {
        const msg = data.val();
        const div = document.createElement('div');
        div.classList.add('message', 'received'); // Default received class
        div.innerText = msg.message;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto scroll to bottom
    });
</script>

</body>
</html>
