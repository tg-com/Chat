<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gost Chat - Admin Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --bg-dark: #0f172a; --bg-card: #1e293b;
            --bg-input: #334155; --text: #f1f5f9; --border: #475569;
            --success: #10b981; --error: #ef4444; --warning: #facc15;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            height: 100vh; color: var(--text); overflow: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }

        /* Screens Management */
        #login-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #chat-screen { display: none; flex-direction: column; flex: 1; background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; }

        /* Sidebar */
        .sidebar {
            position: fixed; right: -300px; top: 0; width: 280px; height: 100%;
            background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(15px);
            border-left: 1px solid var(--border); padding: 25px; transition: 0.4s; z-index: 1000;
        }
        .sidebar.active { right: 0; }

        /* Chat Layout */
        #msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: rgba(15, 23, 42, 0.4); }
        .bubble { max-width: 75%; padding: 12px; border-radius: 15px; position: relative; word-wrap: break-word; }
        .mine { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 2px; }
        .others { align-self: flex-start; background: var(--bg-input); border-bottom-left-radius: 2px; }
        
        /* Admin Elements */
        .admin-badge { font-size: 9px; background: var(--warning); color: #000; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        .action-row { display: flex; align-items: center; width: 100%; gap: 10px; margin-bottom: 12px; }
        .kick-btn { color: var(--error); cursor: pointer; margin-left: auto; font-size: 14px; }
        .admin-tools { padding: 10px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); display: none; justify-content: center; }

        /* System Messages */
        .sys-msg { align-self: center; background: rgba(255,255,255,0.05); font-size: 11px; padding: 5px 15px; border-radius: 20px; color: var(--text-secondary); border: 1px solid var(--border); }

        /* Buttons & Inputs */
        .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .input-wrap { flex: 1; display: flex; background: var(--bg-input); border-radius: 30px; padding: 5px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        .btn-send { background: var(--primary); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-clear { background: var(--error); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h1 style="font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">[Chat]</h1>
        <p style="color: var(--text-secondary); margin-bottom: 30px;">Professional Admin-Led Communication</p>
        <div style="background: var(--bg-card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px;">
            <input type="text" id="username" placeholder="Your Name" style="width:100%; padding:15px; margin-bottom:15px; border-radius:12px; background:var(--bg-input); border:1px solid var(--border); color:white;">
            <input type="text" id="roomcode" placeholder="Room Code" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; background:var(--bg-input); border:1px solid var(--border); color:white;">
            <button onclick="startChat()" style="width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer;">ENTER ROOM</button>
        </div>
    </div>

    <div id="chat-screen">
        <header style="padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(30, 41, 59, 0.5);">
            <div>
                <h3 id="display-room">Room: ---</h3>
                <small id="online-count" style="color: var(--success); cursor: pointer;" onclick="toggleSide()">● 0 Users Online</small>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div id="typing-ui" style="font-size: 11px; color: var(--primary); visibility: hidden;">typing...</div>
                <i class="fas fa-sign-out-alt" onclick="location.reload()" style="cursor: pointer; opacity: 0.7;"></i>
            </div>
        </header>

        <div id="admin-tools-bar" class="admin-tools">
            <button class="btn-clear" onclick="clearAllChat()"><i class="fas fa-trash-alt"></i> Clear All Chat</button>
        </div>

        <div id="msg-box"></div>

        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="msg-input" placeholder="Type a message..." oninput="broadcastTyping()">
            </div>
            <button class="btn-send" onclick="sendToFirebase()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<div id="side-panel" class="sidebar">
    <div style="display:flex; justify-content:space-between; margin-bottom:25px; align-items:center;">
        <h3 style="font-size: 1.2rem;">Online Users</h3>
        <i class="fas fa-times" onclick="toggleSide()" style="cursor:pointer;"></i>
    </div>
    <div id="user-render-list"></div>
</div>

<script>
    // --- 1. CONFIG (Paste your keys here) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me, room, isAdmin = false;

    // --- 2. JOIN LOGIC ---
    function startChat() {
        me = document.getElementById('username').value.trim();
        room = document.getElementById('roomcode').value.trim();
        if(!me || !room) return alert("Please fill details");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('display-room').innerText = "Room: " + room;

        const roomRef = db.ref(`rooms/${room}`);

        // Admin Claim Logic
        roomRef.child('admin').transaction(current => {
            return current === null ? me : current;
        }, (err, committed, snap) => {
            if (snap.val() === me) {
                isAdmin = true;
                document.getElementById('admin-tools-bar').style.display = 'flex';
            }
            enterPresence();
        });
    }

    function enterPresence() {
        const myRef = db.ref(`rooms/${room}/users/${me}`);
        myRef.set({ name: me, isAdmin: isAdmin });
        myRef.onDisconnect().remove();

        // Listen Users & Kicks
        db.ref(`rooms/${room}/users`).on('value', snap => {
            const users = snap.val() || {};
            if (!users[me]) { alert("Admin has removed you."); location.reload(); }
            
            const userArr = Object.values(users);
            document.getElementById('online-count').innerText = `● ${userArr.length} Users Online`;
            renderSidebar(users);
        });

        listenMessages();
    }

    // --- 3. CHAT LOGIC ---
    function sendToFirebase() {
        const txt = document.getElementById('msg-input').value.trim();
        if(!txt) return;
        db.ref(`rooms/${room}/chats`).push({
            sender: me,
            text: txt,
            time: Date.now()
        });
        document.getElementById('msg-input').value = "";
    }

    function listenMessages() {
        const chatRef = db.ref(`rooms/${room}/chats`);
        
        // Listen for new messages
        chatRef.on('child_added', snap => {
            drawBubble(snap.val(), snap.key);
        });

        // Listen for Clear Chat (Deleted messages)
        chatRef.on('child_removed', () => {
            document.getElementById('msg-box').innerHTML = '<div class="sys-msg">Chat was cleared by Admin</div>';
        });
    }

    function drawBubble(data, id) {
        const box = document.getElementById('msg-box');
        const div = document.createElement('div');
        
        if (data.sender === "SYSTEM") {
            div.className = "sys-msg";
            div.innerText = data.text;
        } else {
            div.className = `bubble ${data.sender === me ? 'mine' : 'others'}`;
            div.innerHTML = `<small style="font-size:10px; opacity:0.6">${data.sender}</small><br>${data.text}`;
        }
        
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- 4. ADMIN POWERS ---
    function renderSidebar(users) {
        const list = document.getElementById('user-render-list');
        list.innerHTML = "";
        Object.entries(users).forEach(([id, data]) => {
            const div = document.createElement('div');
            div.className = "action-row";
            div.innerHTML = `
                <div style="width:8px; height:8px; background:var(--success); border-radius:50%"></div>
                <span style="font-size:14px;">${data.name} ${data.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}</span>
                ${isAdmin && data.name !== me ? `<i class="fas fa-user-slash kick-btn" onclick="kick('${data.name}')"></i>` : ''}
            `;
            list.appendChild(div);
        });
    }

    function kick(target) {
        if(confirm(`Kick ${target}?`)) {
            db.ref(`rooms/${room}/users/${target}`).remove();
            db.ref(`rooms/${room}/chats`).push({ sender: "SYSTEM", text: `${target} was kicked.` });
        }
    }

    function clearAllChat() {
        if(confirm("Dhyan dein! Poori chat delete ho jayegi. Continue?")) {
            db.ref(`rooms/${room}/chats`).remove();
        }
    }

    // --- 5. UI EXTRAS ---
    function toggleSide() { document.getElementById('side-panel').classList.toggle('active'); }
    
    function broadcastTyping() {
        // Typing indicator sync can be added here
        const ui = document.getElementById('typing-ui');
        ui.style.visibility = 'visible';
        setTimeout(() => ui.style.visibility = 'hidden', 1000);
    }
</script>
</body>
</html>
