<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat Pro | Secure & Fast</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #075e54; --accent: #25D366; --bg: #e5ddd5; --chat-bg: #efe7de; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Helvetica, sans-serif; }
        
        body { background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        /* Login UI */
        #login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        #login-box h2 { color: var(--primary); margin-bottom: 20px; font-weight: 800; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* Chat UI */
        #chat-ui { width: 100%; height: 100%; display: none; flex-direction: column; background: var(--chat-bg); }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 15px; border-radius: 10px; max-width: 80%; position: relative; font-size: 15px; animation: fadeIn 0.3s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .own { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .other { background: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .meta { font-size: 10px; color: #777; margin-bottom: 4px; display: block; }
        .ticks { font-size: 14px; margin-left: 5px; transition: 0.3s; }

        #typing-status { font-size: 13px; color: #555; padding: 5px 25px; font-style: italic; min-height: 25px; }
        footer { background: #f0f0f0; padding: 12px; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; border: none; padding: 12px 20px; border-radius: 25px; margin: 0; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; justify-content: center; align-items: center; padding: 0; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2>Ghost Chat</h2>
        <input type="text" id="username" placeholder="Enter Your Name">
        <input type="text" id="room-id" placeholder="Enter Room ID">
        <button onclick="initGhostChat()">START CHATTING</button>
    </div>

    <div id="chat-ui">
        <header>
            <div><strong id="room-display"></strong></div>
            <button onclick="location.reload()" style="background:transparent; border:1px solid white; width:auto; padding:5px 12px;">EXIT</button>
        </header>
        <div id="messages"></div>
        <div id="typing-status"></div>
        <footer>
            <input type="text" id="msg-input" placeholder="Type a message..." oninput="updateTyping()">
            <button class="send-btn" onclick="sendMsg()">➔</button>
        </footer>
    </div>

    <script>
        // --- 1. Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAC2NpHaaN8jTQg5G4GaISy76rnYSOGIqs",
            authDomain: "my-chat-77ef9.firebaseapp.com",
            databaseURL: "https://my-chat-77ef9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-chat-77ef9",
            storageBucket: "my-chat-77ef9.firebasestorage.app",
            messagingSenderId: "201184055478",
            appId: "1:201184055478:web:98e67e97e0b6c1f80ed617"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user, room, roomRef;

        function initGhostChat() {
            user = document.getElementById('username').value.trim();
            room = document.getElementById('room-id').value.trim();
            if(!user || !room) return alert("All fields are required!");

            roomRef = db.ref('rooms/' + room);
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('chat-ui').style.display = 'flex';
            document.getElementById('room-display').innerText = "Ghost Room: " + room;

            // FEATURE: Auto-Delete Database on Disconnect
            roomRef.onDisconnect().remove();

            // Listen for Messages
            roomRef.child('msgs').on('child_added', (snap) => {
                const data = snap.val();
                renderMessage(data.user, data.text, data.user === user, snap.key, data.seen);
                
                if(data.user !== user) roomRef.child('msgs').child(snap.key).update({seen: true});

                // GHOST FEATURE: Delete from screen after 60s
                setTimeout(() => {
                    const el = document.getElementById(snap.key);
                    if(el) {
                        el.style.opacity = '0';
                        setTimeout(() => el.remove(), 500);
                    }
                }, 60000);
            });

            // Listen for Blue Ticks
            roomRef.child('msgs').on('child_changed', (snap) => {
                const data = snap.val();
                if(data.seen && data.user === user) {
                    const tickEl = document.querySelector(`#${snap.key} .ticks`);
                    if(tickEl) { tickEl.innerText = ' ✔✔'; tickEl.style.color = '#34B7F1'; }
                }
            });

            // Listen for Typing
            roomRef.child('typing').on('value', snap => {
                const typers = Object.keys(snap.val() || {}).filter(t => t !== user);
                document.getElementById('typing-status').innerText = typers.length ? typers.join(",") + " is typing..." : "";
            });
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            const msgData = { user: user, text: input.value, seen: false, time: Date.now() };
            roomRef.child('msgs').push(msgData);
            input.value = "";
            roomRef.child('typing').child(user).remove();
        }

        function updateTyping() {
            const input = document.getElementById('msg-input');
            input.value.length > 0 ? roomRef.child('typing').child(user).set(true) : roomRef.child('typing').child(user).remove();
        }

        function renderMessage(sender, text, isOwn, id, isSeen) {
            const div = document.createElement('div');
            div.id = id;
            div.className = `msg ${isOwn ? 'own' : 'other'}`;
            const tick = isOwn ? `<span class="ticks" style="color:${isSeen ? '#34B7F1':'#999'}">${isSeen ? ' ✔✔':' ✔'}</span>` : '';
            div.innerHTML = `<span class="meta">${sender}</span>${text} ${tick}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
